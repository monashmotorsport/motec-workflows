name: Validate MoTeC .m1prj

description: >
  Validates one or more MoTeC .m1prj project files against the provided XSD schema.

inputs:
  paths:
    description: 'Space-separated list of file paths or glob patterns to validate'
    required: true
    default: '**/Project.m1prj'
  python-version:
    description: 'Python version to use'
    required: false
    default: '3.13'

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install dependencies
      run: python -m pip install --upgrade pip && pip install lxml
      shell: bash

    - name: Run validator
      env:
        PYTHONPATH: ${{ github.action_path }}
      run: python ${{ github.action_path }}/main.py ${{ inputs.paths }}
      shell: bash
